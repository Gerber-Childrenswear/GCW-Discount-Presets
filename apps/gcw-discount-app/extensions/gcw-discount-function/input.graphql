query Input {
  discount {
    metafield(namespace: "gcw", key: "discount_config") {
      value
    }
  }
  cart {
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            productType
            isGiftCard
            vendor
            excludeCheck: hasAnyTag(tags: [
              "no discount", "no discount:strict",
              "final-sale", "no-return", "DOTW"
            ])
            tagChecks: hasTags(tags: [
              "discount", "sale", "clearance", "markdown", "promo",
              "bundle", "bogo", "bxgy", "gift",
              "holiday", "flash-sale", "doorbuster", "flag:doorbuster", "outlet", "overstock",
              "member", "vip", "loyalty",
              "baby", "toddler", "kids", "infant", "newborn",
              "boys", "girls",
              "nfl",
              "preorder", "backorder"
            ]) {
              hasTag
              tag
            }
          }
        }
      }
    }
  }
}
